<h2>Automated Ban Log Generator</h2>

<div style="display: flex; gap: 20px; align-items: flex-start;">
    <div style="flex: 1; background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px;">
        <h4 style="margin: 0 0 15px 0; color: var(--accent);">Ban Log Configurator</h4>
        
        <div class="form-group">
            <label>Ticket ID</label>
            <input type="text" id="banLogTicketId" readonly style="background: #222; color: #888;">
        </div>

        <div class="form-group">
            <label>Roblox ID(s)</label>
            <textarea id="banLogRobloxIds" readonly style="background: #222; color: #888; height: 60px; resize: none; font-family: monospace; font-size: 12px;"></textarea>
        </div>

        <div class="form-group">
            <label for="banLogLength">Ban Length</label>
            <input type="text" id="banLogLength" placeholder="e.g., 2m, 5w, Permanent">
        </div>

        <div class="form-group">
            <label style="margin-bottom: 8px; display: block;">Select Violated Rules (Reason Compiler)</label>
            <div style="display: flex; flex-direction: column; gap: 6px; background: #1a1a24; padding: 10px; border-radius: 6px; border: 1px solid var(--border);">
                <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                    <input type="checkbox" class="ban-reason-check" value="2.2.1: Not completing your side of the original deal."> 2.2.1 Deal Incompletion
                </label>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                    <input type="checkbox" class="ban-reason-check" value="2.2.2: Selling/reselling stolen, plagiarized, or AI assets."> 2.2.2 Asset Theft/AI Misuse
                </label>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                    <input type="checkbox" class="ban-reason-check" value="2.2.3: Changing an agreed deal without the other user's consent."> 2.2.3 Non-Consensual Changes
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="banLogEvidence">Evidence Link</label>
            <input type="text" id="banLogEvidence" placeholder="e.g., https://ibb.co/... or verification folder link">
        </div>
        
        <div style="margin-top: 20px;">
            <button class="action-btn" id="copyBanLogBtn" style="background-color: #ff4757; width: 100%; padding: 12px; font-weight: bold;">📋 Copy Active Ban Log Chunk</button>
        </div>
    </div>

    <div style="flex: 1.2; display: flex; flex-direction: column; gap: 15px; min-height: 480px;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px;">
            <span id="banLogIndexLabel" style="font-weight: bold; color: #ffa502; font-size: 14px;">Ban Log #1</span>
            
            <div style="display: flex; align-items: center; gap: 8px;">
                <button id="prevBanLogChunk" style="background: #2a2a35; border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">&lt;</button>
                <span id="banLogPaginationStatus" style="font-family: monospace; font-size: 13px; color: var(--text-muted);">1 / 1</span>
                <button id="nextBanLogChunk" style="background: #2a2a35; border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">&gt;</button>
            </div>
        </div>

        <div style="background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 8px; flex: 1; display: flex; flex-direction: column;">
            <h4 style="margin: 0 0 15px 0; color: var(--text-main);">Chunked Template Command Preview</h4>
            <textarea id="banLogPreviewBox" readonly style="flex: 1; width: 100%; background: #111; color: #cbd5e1; font-family: 'Courier New', Courier, monospace; font-size: 13px; line-height: 1.6; padding: 15px; border-radius: 6px; resize: none; border: 1px solid var(--border); min-height: 250px;"></textarea>
        </div>
    </div>
</div>
